kind = "web"
previewPath = "/cts-dashboard/"
title = "IOB CTS Operations Dashboard"
version = "1.0.0"
id = "artifacts/cts-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cts-dashboard/" ]
localPort = 21313

[services.development]
run = "pnpm --filter @workspace/cts-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cts-dashboard", "run", "build" ]
publicDir = "artifacts/cts-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21313"
BASE_PATH = "/cts-dashboard/"
